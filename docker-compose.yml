services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ai_rpa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    ports:
      - "8501:8501"
    environment:
      VECTOR_BACKEND: pgvector
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/ai_rpa
    volumes:
      - ./data:/app/data

volumes:
  pgdata:

